<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menge-Bibel — Annotationsprojekt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a class="site-title" href="index.html">Die Heilige Schrift &nbsp;·&nbsp; <em>Menge-Bibel</em></a>
  <nav class="site-nav">
    <a href="index.html">Übersicht</a>
    <a href="index.html#ueber">Über das Projekt</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar-nav" id="sidebar-nav">
    <div style="font-family:var(--schrift-ui);font-size:13px;color:#bbb;padding:8px;">Lädt…</div>
  </aside>
  <main class="main-content" id="main-content">
    <div style="font-family:var(--schrift-ui);font-size:14px;color:#bbb;padding:2rem;">Bibeltext wird geladen…</div>
  </main>
  <aside class="sidebar-toc" id="sidebar-toc">
    <div style="font-family:var(--schrift-ui);font-size:13px;color:#bbb;">Lädt…</div>
  </aside>
</div>

<footer class="site-footer">
  Textgrundlage: <a href="https://github.com/renehamburger/Menge-Bibel" target="_blank">Menge-Bibel</a>
  von Hermann Menge · gemeinfrei seit 2010 ·
  <a href="https://creativecommons.org/publicdomain/mark/1.0/deed.de" target="_blank">Public Domain Mark 1.0</a>
  · AT-Links verweisen auf die
  <a href="https://www.bibleserver.com/MENG" target="_blank">Menge-Version auf bibleserver.com</a>
</footer>

<script>
const QUELL_REPO = "renehamburger/Menge-Bibel";

function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    buch:    p.get("buch")    || "markus",
    kapitel: parseInt(p.get("kapitel") || "1")
  };
}

// ─── Markdown → strukturierte Elemente ───────────────────────────────────────
//
// Format der Menge-Bibel Markdown-Dateien (empirisch geprüft):
//   - Kapitelmarkierung: __N__ (Underscores) auf eigener Zeile
//   - Versnummern: <sup>N</sup> als HTML direkt im Fließtext
//   - Fußnoten: <sup title="TEXT">&#x2732;</sup>
//     → werden als <span class="fn" title="TEXT">*</span> erhalten
//       (Hover-Tooltip im Browser via nativen title-Mechanismus)
//   - Abschnittsüberschriften: # ## ### Markdown-Headings
//   - Überschriften VOR __N__: alle Headings zwischen letztem Fließtext
//     des Vorgänger-Kapitels und __N__ gehören zum neuen Kapitel
//   - Überschriften AM ENDE eines Kapitelblocks gehören zum nächsten Kapitel
//
// Rückgabe: Array von Elementen:
//   { typ: 'heading', level: 2, text: '...' }
//   { typ: 'absatz',  verse: [ { nr: 1, text: '...' }, ... ] }
//
// Verse innerhalb eines Markdown-Absatzes (keine Leerzeile dazwischen)
// werden als ein Element zusammengefasst und in einem <p> ausgegeben.
//
function extrahiereKapitel(markdown, kapitelNr) {
  const lines = markdown.split('\n');

  // Schritt 1: Kapitelstart finden + vorgelagerte Überschriften sammeln
  let kapitelStart = null;
  let ueberschriftenVorKapitel = [];

  for (let idx = 0; idx < lines.length; idx++) {
    const stripped = lines[idx].trim();

    if (stripped === '') continue;

    const hm = stripped.match(/^(#{1,6})\s+(.+)$/);
    if (hm) {
      ueberschriftenVorKapitel.push({ typ: 'heading', level: hm[1].length, text: hm[2].trim() });
      continue;
    }

    const m = stripped.match(/^__(\d+)__\s*$/);
    if (m) {
      if (parseInt(m[1]) === kapitelNr) {
        kapitelStart = idx;
        break;
      } else {
        ueberschriftenVorKapitel = [];
      }
    } else {
      ueberschriftenVorKapitel = [];
    }
  }

  if (kapitelStart === null) return [];

  // Schritt 2: Kapitelblock sammeln
  const blockLines = [];
  for (let i = kapitelStart + 1; i < lines.length; i++) {
    if (/^__\d+__\s*$/.test(lines[i].trim())) break;
    blockLines.push(lines[i]);
  }

  // Schritt 3: Trailing Überschriften + Leerzeilen abschneiden
  let ende = blockLines.length - 1;
  while (ende >= 0) {
    const s = blockLines[ende].trim();
    if (s === '' || /^#{1,6}\s+/.test(s)) {
      ende--;
    } else {
      break;
    }
  }
  blockLines.length = ende + 1;

  // Schritt 4: Absätze bilden
  const absaetze = [];
  let aktuell = [];
  for (const line of blockLines) {
    if (line.trim() === '') {
      if (aktuell.length) { absaetze.push(aktuell); aktuell = []; }
    } else {
      aktuell.push(line);
    }
  }
  if (aktuell.length) absaetze.push(aktuell);

  // Schritt 5: Elemente aufbauen
  const elemente = [...ueberschriftenVorKapitel];

  for (const absatz of absaetze) {
    const ersteZeile = absatz[0].trim();

    const hm = ersteZeile.match(/^(#{1,6})\s+(.+)$/);
    if (hm) {
      elemente.push({ typ: 'heading', level: hm[1].length, text: hm[2].trim() });
      continue;
    }

    let block = absatz.join(' ');

    // Fußnoten ZWEISTUFIG verarbeiten:
    // Schritt A: Fußnoten aus dem Text herausziehen und ihre Positionen im
    //   bereinigten Text merken. Die JSON-Annotationen (von/bis) basieren auf
    //   dem bereinigten Text — deshalb müssen Fußnoten erst NACH der
    //   Annotation-Anwendung wieder eingefügt werden (in renderAbsatz).
    //
    // Das Fußnotenzeichen kann als HTML-Entity (&#x2732;) oder UTF-8 (✲) vorkommen.
    // Das title-Attribut kann einfache oder doppelte Anführungszeichen haben.
    const fnRegex = /<sup\s+title=(["'])([^"']*)\1>\s*(?:&#x[\da-fA-F]+;|✲)\s*<\/sup>/g;
    const fnMap = []; // { pos, title } — Position im bereinigten Text
    let bereinigt = '';
    let fnCursor = 0;
    let fnMatch;
    while ((fnMatch = fnRegex.exec(block)) !== null) {
      bereinigt += block.slice(fnCursor, fnMatch.index);
      fnMap.push({ pos: bereinigt.length, title: fnMatch[2] });
      fnCursor = fnMatch.index + fnMatch[0].length;
    }
    bereinigt += block.slice(fnCursor);
    bereinigt = bereinigt.replace(/&#x[\da-fA-F]+;/g, '');
    bereinigt = bereinigt.replace(/\s+/g, ' ').trim();

    // Verse des Absatzes extrahieren (auf bereinigtem Text)
    const parts = bereinigt.split(/<sup>(\d+)<\/sup>/);
    const verseImAbsatz = [];
    let versOffset = 0;
    for (let i = 1; i < parts.length - 1; i += 2) {
      const nr = parseInt(parts[i]);
      const text = parts[i + 1].trim();
      if (text) {
        const versStart = bereinigt.indexOf(text, versOffset);
        const versEnde  = versStart + text.length;
        const fnInVers  = fnMap
          .filter(f => f.pos >= versStart && f.pos <= versEnde)
          .map(f => ({ pos: f.pos - versStart, title: f.title }));
        verseImAbsatz.push({ nr, text, fn: fnInVers });
        versOffset = versEnde;
      }
    }

    if (verseImAbsatz.length) {
      elemente.push({ typ: 'absatz', verse: verseImAbsatz });
    }
  }

  return elemente;
}

// ─── Absatz-globaler Span-Renderer ───────────────────────────────────────────
//
// Neues Modell (ersetzt den versweisen wendeAnnotationenAn):
//
// Ablauf:
//   1. Absatztext zusammenbauen: Verse werden mit ihren Versnummern
//      aneinandergereiht, dabei werden die Versstart-Offsets notiert.
//   2. Annotationen werden in absatz-globale Zeichenpositionen übersetzt.
//      Markierungen haben vers_von/vers_bis (für versübergreifende Spans)
//      oder vers (für einversige, rückwärtskompatibel).
//   3. Ein einziger Durchlauf baut das HTML mit allen Spans auf.
//      Sortierung: längere Spans vor kürzeren (äußere vor innere),
//      so entsteht korrekte HTML-Schachtelung ohne Fallunterscheidung.
//   4. Versnummern und Fußnoten werden als Inline-Events eingefügt,
//      unabhängig von den Farb-Spans.
//
// Regel: Grün (AT) kann innerhalb Rot (Jesus) vorkommen, nie umgekehrt.
// Das ergibt sich automatisch aus der Sortierung — AT-Spans sind immer
// kürzer als der sie umgebende Jesus-Span.
//
function renderAbsatz(absatz, alleMarkierungen) {
  const verse = absatz.verse;
  if (!verse.length) return '';

  // ── Schritt 1: Versoffsets im Absatztext berechnen ──
  // Wir bauen einen virtuellen Absatztext aus den bereinigten Verstexten.
  // Trennzeichen zwischen Versen: ein Leerzeichen (entspricht dem
  // tatsächlichen Rendering, wo Verse im selben <p> fließen).
  // Die Versnummer-Tags (<sup>N</sup>) sind kein Teil des bereinigten Texts,
  // werden aber als Inline-Events gesondert eingefügt.

  const versOffsets = []; // { nr, start, end, fn }
  let absatzText = '';
  for (const vers of verse) {
    const start = absatzText.length;
    absatzText += vers.text;
    const end = absatzText.length;
    versOffsets.push({ nr: vers.nr, start, end, fn: vers.fn || [] });
    absatzText += ' '; // Trennzeichen zwischen Versen
  }

  const n = absatzText.length;

  // ── Schritt 2: Markierungen in absatz-globale Positionen übersetzen ──
  const spans = [];

  for (const m of alleMarkierungen) {
    // Rückwärtskompatibilität: altes Format hat "vers", neues hat "vers_von"/"vers_bis"
    const versVon = m.vers_von !== undefined ? m.vers_von : m.vers;
    const versBis = m.vers_bis !== undefined ? m.vers_bis : m.vers;

    const startVers = versOffsets.find(v => v.nr === versVon);
    const endVers   = versOffsets.find(v => v.nr === versBis);
    if (!startVers || !endVers) continue;

    const globalVon = startVers.start + m.von;
    const globalBis = m.bis === -1 ? endVers.end : endVers.start + m.bis;

    // AT-Link aufbauen
    let link = '';
    if (m.typ === 'at') {
      if (m.urls) {
        for (const u of m.urls)
          link += ` <a href="${u.url}" target="_blank">(${u.label})</a>`;
      } else if (m.url && m.referenz) {
        const label = m.vgl ? `vgl. ${m.referenz}` : m.referenz;
        link = ` <a href="${m.url}" target="_blank">(${label})</a>`;
      }
    }

    spans.push({ von: globalVon, bis: globalBis, typ: m.typ, link });
  }

  // ── Schritt 3: Events aufbauen ──
  // Öffnende Tags: äußere Spans zuerst (nach von aufsteigend,
  // bei gleichem von: längerer Span zuerst → äußerer zuerst geöffnet)
  // Schließende Tags + Links: innerste zuerst (unshift), damit Links
  // korrekt innerhalb ihres Spans bleiben.

  spans.sort((a, b) => a.von - b.von || (b.bis - b.von) - (a.bis - a.von));

  const openEvents  = {}; // pos → [html]
  const closeEvents = {}; // pos → [html]

  function insOpen(pos, str) {
    if (!openEvents[pos])  openEvents[pos]  = [];
    openEvents[pos].push(str);
  }
  function insClose(pos, str) {
    if (!closeEvents[pos]) closeEvents[pos] = [];
    closeEvents[pos].unshift(str);
  }

  for (const s of spans) {
    const klasse = s.typ === 'jesus' ? 'jesus' : 'at';
    insOpen(s.von,  `<span class="${klasse}">`);
    insClose(s.bis, `${s.link}</span>`);
  }

  // Versnummern als Open-Events (vor dem Verstext)
  const vnEvents = {};
  for (const v of versOffsets) {
    if (!vnEvents[v.start]) vnEvents[v.start] = [];
    vnEvents[v.start].push(`<span class="vn">${v.nr}</span>`);
  }

  // Fußnoten als Close-then-Open-Events an ihrer absoluten Position
  // (nach closeEvents, vor openEvents — korrekte Einbettung in Farb-Spans)
  const fnEvents = {};
  for (const v of versOffsets) {
    for (const fn of v.fn) {
      const absPos = v.start + fn.pos;
      if (!fnEvents[absPos]) fnEvents[absPos] = [];
      const title = fn.title.replace(/"/g, '&quot;');
      fnEvents[absPos].push(`<span class="fn" title="${title}">*</span>`);
    }
  }

  // ── Schritt 4: HTML zusammenbauen ──
  let result = '';
  for (let i = 0; i <= n; i++) {
    if (closeEvents[i]) result += closeEvents[i].join('');
    if (fnEvents[i])    result += fnEvents[i].join('');
    if (vnEvents[i])    result += vnEvents[i].join('');
    if (openEvents[i])  result += openEvents[i].join('');
    if (i < n) result += absatzText[i];
  }

  return `<p>${result.trimEnd()}</p>`;
}

// ─── Überschrift → HTML ──────────────────────────────────────────────────────
function renderHeading(heading) {
  if (heading.level === 1) return '';
  const id = heading.text
    .toLowerCase()
    .replace(/[^a-z0-9äöüß]/g, '-')
    .replace(/-+/g, '-')
    .slice(0, 50);
  if (heading.level === 2) {
    return `<div class="abschnitt-kopf" id="${id}">${heading.text}</div>`;
  } else {
    return `<div class="abschnitt-titel" id="${id}">${heading.text}</div>`;
  }
}

// ─── Sidebar / TOC ───────────────────────────────────────────────────────────
// manifest: das geladene Manifest-Objekt
// aktBuch:  id des aktuellen Buchs
// aktKap:   Nummer des aktuellen Kapitels
function baueSidebar(manifest, aktBuch, aktKap) {
  let html = '';
  // Bücher in Manifest-Reihenfolge
  for (const buch of manifest.buecher) {
    const buchAktiv = buch.id === aktBuch;
    html += `<h4>${buch.name}</h4><ul class="book-list">`;
    for (const k of buch.kapitel) {
      const aktiv = buchAktiv && k === aktKap ? ' class="aktiv"' : '';
      html += `<li><a href="kapitel.html?buch=${buch.id}&kapitel=${k}"${aktiv}>Kapitel ${k}</a></li>`;
    }
    html += `</ul>`;
  }
  html += `<h4>Weitere</h4><ul class="book-list">`;
  html += `<li><a href="index.html">← Zur Übersicht</a></li></ul>`;
  return html;
}

function baueToc(elemente, voriges, naechstes, buch) {
  const h2s = elemente.filter(e => e.typ === 'heading' && e.level === 2);
  let html = '';
  if (h2s.length) {
    html += `<h4>Abschnitte</h4><ul class="toc-liste">`;
    for (const h of h2s) {
      const id = h.text
        .toLowerCase()
        .replace(/[^a-z0-9äöüß]/g, '-')
        .replace(/-+/g, '-')
        .slice(0, 50);
      html += `<li><a href="#${id}">${h.text}</a></li>`;
    }
    html += `</ul>`;
  }
  html += `<div class="kapitel-nav">`;
  if (voriges)   html += `<a href="kapitel.html?buch=${buch}&kapitel=${voriges}">← Kap. ${voriges}</a>`;
  if (naechstes) html += `<a href="kapitel.html?buch=${buch}&kapitel=${naechstes}">Kap. ${naechstes} →</a>`;
  html += `</div>`;
  return html;
}

// ─── Hauptfunktion ───────────────────────────────────────────────────────────
async function ladeSeite() {
  const { buch, kapitel } = getParams();

  try {
    // Manifest laden — einzige Quelle für Bücher und Kapitel
    const manifestRes = await fetch("annotationen/manifest.json");
    if (!manifestRes.ok) throw new Error(`Manifest nicht ladbar: ${manifestRes.status}`);
    const manifest = await manifestRes.json();

    const info = manifest.buecher.find(b => b.id === buch);
    if (!info) {
      document.getElementById("main-content").innerHTML = "<p>Buch nicht gefunden.</p>";
      return;
    }

    document.getElementById("sidebar-nav").innerHTML = baueSidebar(manifest, buch, kapitel);

    const textUrl = `https://raw.githubusercontent.com/${QUELL_REPO}/master/${info.quellpfad}`;
    const textRes = await fetch(textUrl);
    if (!textRes.ok) throw new Error(`Text nicht ladbar: ${textRes.status}`);
    const markdown = await textRes.text();

    const annoUrl = `annotationen/${buch}/kapitel-${kapitel}.json`;
    const annoRes = await fetch(annoUrl);
    if (!annoRes.ok) throw new Error(`Annotationen nicht ladbar: ${annoRes.status}`);
    const anno = await annoRes.json();

    const elemente = extrahiereKapitel(markdown, kapitel);
    const hatVerse = elemente.some(e => e.typ === 'absatz' && e.verse.length > 0);
    if (!hatVerse) throw new Error(`Keine Verse gefunden für Kapitel ${kapitel}`);

    document.title = `${info.name} ${kapitel} — Menge-Bibel Annotationsprojekt`;

    let html = `
      <div class="kapitel-header">
        <div class="kapitel-label">${info.name} &nbsp;·&nbsp; Kapitel ${kapitel}</div>
        <h1 class="kapitel-titel">${anno.titel}</h1>
        <div class="kapitel-untertitel">Übersetzt von Hermann Menge · Menge-Bibel (1926)</div>
      </div>
      <div class="legende">
        <span><span class="punkt punkt-rot"></span> Worte Jesu</span>
        <span><span class="punkt punkt-gruen"></span> Alttestamentlicher Bezug / Zitat</span>
      </div>
      <div class="bibeltext">`;

    // Nur aktive Markierungen rendern — fehlendes status-Feld gilt als "aktiv"
    const aktiveMarkierungen = anno.markierungen.filter(m => (m.status || 'aktiv') === 'aktiv');

    for (const element of elemente) {
      if (element.typ === 'heading') {
        html += renderHeading(element);
      } else {
        html += renderAbsatz(element, aktiveMarkierungen);
      }
    }

    html += `</div>`;
    document.getElementById("main-content").innerHTML = html;

    const liste  = info.kapitel;
    const posIdx = liste.indexOf(kapitel);
    const vor    = posIdx > 0 ? liste[posIdx - 1] : null;
    const nach   = posIdx < liste.length - 1 ? liste[posIdx + 1] : null;
    document.getElementById("sidebar-toc").innerHTML = baueToc(elemente, vor, nach, buch);

  } catch (err) {
    document.getElementById("main-content").innerHTML =
      `<div style="font-family:var(--schrift-ui);color:#c00;padding:2rem;">
        Fehler beim Laden: ${err.message}
      </div>`;
    console.error(err);
  }
}

ladeSeite();
</script>
</body>
</html>
