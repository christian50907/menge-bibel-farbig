<body>

<header class="site-header">
  <a class="site-title" href="index.html">Die Heilige Schrift &nbsp;·&nbsp; <em>Menge-Bibel</em></a>
  <nav class="site-nav">
    <a href="index.html">Übersicht</a>
    <a href="index.html#ueber">Über das Projekt</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar-nav" id="sidebar-nav">
    <div style="font-family:var(--schrift-ui);font-size:13px;color:#bbb;padding:8px;">Lädt…</div>
  </aside>
  <main class="main-content" id="main-content">
    <div style="font-family:var(--schrift-ui);font-size:14px;color:#bbb;padding:2rem;">Bibeltext wird geladen…</div>
  </main>
  <aside class="sidebar-toc" id="sidebar-toc">
    <div style="font-family:var(--schrift-ui);font-size:13px;color:#bbb;">Lädt…</div>
  </aside>
</div>

<footer class="site-footer">
  Textgrundlage: <a href="https://github.com/renehamburger/Menge-Bibel" target="_blank">Menge-Bibel</a>
  von Hermann Menge · gemeinfrei seit 2010 ·
  <a href="https://creativecommons.org/publicdomain/mark/1.0/deed.de" target="_blank">Public Domain Mark 1.0</a>
  · AT-Links verweisen auf die
  <a href="https://www.bibleserver.com/MENG" target="_blank">Menge-Version auf bibleserver.com</a>
</footer>

<script>
const REPO_OWNER = "christian50907";
const REPO_NAME  = "menge-bibel-farbig";
const QUELL_REPO = "renehamburger/Menge-Bibel";

const BUECHER = {
  markus: {
    quellpfad:   "Bibel/Neues%20Testament/02%20-%20Markus.md",
    anzeigename: "Markus",
    kapitel:     [1, 2]
  }
};

function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    buch:    p.get("buch")    || "markus",
    kapitel: parseInt(p.get("kapitel") || "1")
  };
}

// ─── Markdown → strukturierte Elemente ───────────────────────────────────────
//
// Format der Menge-Bibel Markdown-Dateien (empirisch geprüft):
//   - Kapitelmarkierung: __N__ (Underscores) auf eigener Zeile
//   - Versnummern: <sup>N</sup> als HTML direkt im Fließtext
//   - Fußnoten: <sup title="...">…</sup> werden entfernt
//   - Abschnittsüberschriften: # ## ### Markdown-Headings
//   - Die erste Überschrift eines Kapitels steht oft VOR __N__
//     (direkt davor, nur Leerzeilen dazwischen — keine Textzeilen)
//
// Rückgabe: Array von Elementen:
//   { typ: 'heading', level: 2, text: '...' }
//   { typ: 'vers',    nr: 1,    text: '...' }
//
function extrahiereKapitel(markdown, kapitelNr) {
  const lines = markdown.split('\n');

  // Schritt 1: Kapitelstart finden + letzte direkt vorgelagerte Überschrift merken
  // "Direkt vorgelagert" = nur Leerzeilen zwischen Überschrift und __N__,
  // keine anderen Nicht-Leer-Zeilen.
  let kapitelStart = null;
  let letzteUeberschrift = null;

  for (let idx = 0; idx < lines.length; idx++) {
    const stripped = lines[idx].trim();

    if (stripped === '') continue; // Leerzeilen ignorieren

    const hm = stripped.match(/^(#{1,6})\s+(.+)$/);
    if (hm) {
      letzteUeberschrift = { typ: 'heading', level: hm[1].length, text: hm[2].trim() };
      continue;
    }

    const m = stripped.match(/^__(\d+)__\s*$/);
    if (m) {
      if (parseInt(m[1]) === kapitelNr) {
        kapitelStart = idx;
        break;
      } else {
        letzteUeberschrift = null; // andere Kapitelmarkierung → reset
      }
    } else {
      // Irgendeine andere Nicht-Leer-Zeile (Vers-Text etc.)
      // → Überschrift ist nicht mehr direkt vor unserem __N__
      letzteUeberschrift = null;
    }
  }

  if (kapitelStart === null) return [];

  // Schritt 2: Zeilen des Kapitels sammeln (bis zum nächsten __N__)
  const blockLines = [];
  for (let i = kapitelStart + 1; i < lines.length; i++) {
    if (/^__\d+__\s*$/.test(lines[i].trim())) break;
    blockLines.push(lines[i]);
  }

  // Schritt 3: Absätze bilden (Leerzeilen als Trenner)
  const absaetze = [];
  let aktuell = [];
  for (const line of blockLines) {
    if (line.trim() === '') {
      if (aktuell.length) { absaetze.push(aktuell); aktuell = []; }
    } else {
      aktuell.push(line);
    }
  }
  if (aktuell.length) absaetze.push(aktuell);

  // Schritt 4: Elemente aufbauen
  const elemente = [];

  // Vorgelagerte Überschrift voranstellen
  if (letzteUeberschrift) elemente.push(letzteUeberschrift);

  for (const absatz of absaetze) {
    const ersteZeile = absatz[0].trim();

    // Ist der Absatz eine Überschrift?
    const hm = ersteZeile.match(/^(#{1,6})\s+(.+)$/);
    if (hm) {
      elemente.push({ typ: 'heading', level: hm[1].length, text: hm[2].trim() });
      continue;
    }

    // Textblock: Fußnoten entfernen, Verse extrahieren
    let block = absatz.join(' ');
    block = block.replace(/<sup\s+title=[^>]*>.*?<\/sup>/g, ''); // Fußnoten weg
    block = block.replace(/&#x[\da-fA-F]+;/g, '');               // HTML-Entities weg
    block = block.replace(/\s+/g, ' ').trim();

    // Split an <sup>N</sup> Versnummern
    const parts = block.split(/<sup>(\d+)<\/sup>/);
    for (let i = 1; i < parts.length - 1; i += 2) {
      const nr = parseInt(parts[i]);
      const text = parts[i + 1].trim();
      if (text) elemente.push({ typ: 'vers', nr, text });
    }
  }

  return elemente;
}

// ─── Annotationen rendern ────────────────────────────────────────────────────
function wendeAnnotationenAn(versText, annotationen) {
  const n = versText.length;

  const spans = annotationen.map(a => ({
    von:      a.von,
    bis:      a.bis === -1 ? n : a.bis,
    typ:      a.typ,
    url:      a.url      || null,
    referenz: a.referenz || null,
    vgl:      a.vgl      || false,
    urls:     a.urls     || null,
  }));

  spans.sort((a, b) => a.von - b.von || (b.bis - b.von) - (a.bis - a.von));

  const events = {};
  function ins(pos, str) {
    if (!events[pos]) events[pos] = [];
    events[pos].push(str);
  }

  for (const s of spans) {
    const klasse = s.typ === 'jesus' ? 'jesus' : 'at';
    let link = '';
    if (s.typ === 'at') {
      if (s.urls) {
        for (const u of s.urls)
          link += ` <a href="${u.url}" target="_blank">(${u.label})</a>`;
      } else if (s.url && s.referenz) {
        const label = s.vgl ? `vgl. ${s.referenz}` : s.referenz;
        link = ` <a href="${s.url}" target="_blank">(${label})</a>`;
      }
    }
    ins(s.von, `<span class="${klasse}">`);
    ins(s.bis, `${link}</span>`);
  }

  let result = '';
  for (let i = 0; i <= n; i++) {
    if (events[i]) result += events[i].join('');
    if (i < n) result += versText[i];
  }
  return result;
}

// ─── Überschrift → HTML ──────────────────────────────────────────────────────
function renderHeading(heading) {
  if (heading.level === 1) {
    return ''; // Buchtitel: steht schon im kapitel-header, überspringen
  }
  // Eindeutige ID für Anker-Links (TOC)
  const id = heading.text
    .toLowerCase()
    .replace(/[^a-z0-9äöüß]/g, '-')
    .replace(/-+/g, '-')
    .slice(0, 50);

  if (heading.level === 2) {
    return `<div class="abschnitt-kopf" id="${id}">${heading.text}</div>`;
  } else {
    return `<div class="abschnitt-titel" id="${id}">${heading.text}</div>`;
  }
}

// ─── Sidebar / TOC ───────────────────────────────────────────────────────────
function baueSidebar(buch, aktKap) {
  const info = BUECHER[buch];
  let html = `<h4>${info.anzeigename}</h4><ul class="book-list">`;
  for (const k of info.kapitel) {
    const akt = k === aktKap ? ' class="aktiv"' : '';
    html += `<li><a href="kapitel.html?buch=${buch}&kapitel=${k}"${akt}>Kapitel ${k}</a></li>`;
  }
  html += `</ul><h4>Weitere Bücher</h4><ul class="book-list">`;
  html += `<li><a href="index.html">← Zur Übersicht</a></li></ul>`;
  return html;
}

function baueToc(elemente, voriges, naechstes, buch) {
  // TOC aus H2-Überschriften aufbauen
  const h2s = elemente.filter(e => e.typ === 'heading' && e.level === 2);
  let html = '';
  if (h2s.length) {
    html += `<h4>Abschnitte</h4><ul class="toc-liste">`;
    for (const h of h2s) {
      const id = h.text
        .toLowerCase()
        .replace(/[^a-z0-9äöüß]/g, '-')
        .replace(/-+/g, '-')
        .slice(0, 50);
      html += `<li><a href="#${id}">${h.text}</a></li>`;
    }
    html += `</ul>`;
  }
  html += `<div class="kapitel-nav">`;
  if (voriges)   html += `<a href="kapitel.html?buch=${buch}&kapitel=${voriges}">← Kap. ${voriges}</a>`;
  if (naechstes) html += `<a href="kapitel.html?buch=${buch}&kapitel=${naechstes}">Kap. ${naechstes} →</a>`;
  html += `</div>`;
  return html;
}

// ─── Hauptfunktion ───────────────────────────────────────────────────────────
async function ladeSeite() {
  const { buch, kapitel } = getParams();
  const info = BUECHER[buch];
  if (!info) {
    document.getElementById("main-content").innerHTML = "<p>Buch nicht gefunden.</p>";
    return;
  }

  document.getElementById("sidebar-nav").innerHTML = baueSidebar(buch, kapitel);

  try {
    const textUrl = `https://raw.githubusercontent.com/${QUELL_REPO}/master/${info.quellpfad}`;
    const textRes = await fetch(textUrl);
    if (!textRes.ok) throw new Error(`Text nicht ladbar: ${textRes.status}`);
    const markdown = await textRes.text();

    const annoUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/annotationen/${buch}/kapitel-${kapitel}.json`;
    const annoRes = await fetch(annoUrl);
    if (!annoRes.ok) throw new Error(`Annotationen nicht ladbar: ${annoRes.status}`);
    const anno = await annoRes.json();

    const elemente = extrahiereKapitel(markdown, kapitel);
    const verse = elemente.filter(e => e.typ === 'vers');
    if (!verse.length) throw new Error(`Keine Verse gefunden für Kapitel ${kapitel}`);

    document.title = `${info.anzeigename} ${kapitel} — Menge-Bibel Annotationsprojekt`;

    let html = `
      <div class="kapitel-header">
        <div class="kapitel-label">${info.anzeigename} &nbsp;·&nbsp; Kapitel ${kapitel}</div>
        <h1 class="kapitel-titel">${anno.titel}</h1>
        <div class="kapitel-untertitel">Übersetzt von Hermann Menge · Menge-Bibel (1926)</div>
      </div>
      <div class="legende">
        <span><span class="punkt punkt-rot"></span> Worte Jesu</span>
        <span><span class="punkt punkt-gruen"></span> Alttestamentlicher Bezug / Zitat</span>
      </div>
      <div class="bibeltext">`;

    for (const element of elemente) {
      if (element.typ === 'heading') {
        html += renderHeading(element);
      } else {
        const markierungen = anno.markierungen.filter(m => m.vers === element.nr);
        const versHtml = markierungen.length
          ? wendeAnnotationenAn(element.text, markierungen)
          : element.text;
        html += `<p><span class="vn">${element.nr}</span>${versHtml}</p>`;
      }
    }

    html += `</div>`;
    document.getElementById("main-content").innerHTML = html;

    const liste  = info.kapitel;
    const posIdx = liste.indexOf(kapitel);
    const vor    = posIdx > 0 ? liste[posIdx - 1] : null;
    const nach   = posIdx < liste.length - 1 ? liste[posIdx + 1] : null;
    document.getElementById("sidebar-toc").innerHTML = baueToc(elemente, vor, nach, buch);

  } catch (err) {
    document.getElementById("main-content").innerHTML =
      `<div style="font-family:var(--schrift-ui);color:#c00;padding:2rem;">
        Fehler beim Laden: ${err.message}
      </div>`;
    console.error(err);
  }
}

ladeSeite();
</script>
</body>
</html>
